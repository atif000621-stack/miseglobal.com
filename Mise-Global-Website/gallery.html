<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Mise Global</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #D4AF37;
            --black: #1a1a1a;
            --white: #ffffff;
            --gray: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--white);
            color: var(--black);
        }

        /* Navigation Style (Jo aapne pehle share ki thi) */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5%;
            background: var(--black);
            color: white;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .btn-gold {
            background-color: var(--gold);
            color: black;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-gold:hover {
            background-color: #b8860b;
        }

        /* Gallery Header */
        .gallery-header {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('hero-bg.jpg'); /* Background image optional */
            background-size: cover;
            color: white;
        }

        .gallery-header h1 {
            font-size: 2.5rem;
            color: var(--gold);
            margin-bottom: 10px;
        }

        /* Filter Buttons */
        .filter-container {
            text-align: center;
            margin: 30px 0;
        }

        .filter-btn {
            padding: 10px 20px;
            margin: 5px;
            border: 2px solid var(--gold);
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            border-radius: 25px;
        }

        .filter-btn.active, .filter-btn:hover {
            background: var(--gold);
            color: black;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 0 5% 50px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            height: 250px;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .overlay {
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            color: var(--gold);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.4s;
            text-align: center;
            padding: 20px;
        }

        .gallery-item:hover .overlay {
            bottom: 0;
        }

        .overlay h3 { margin: 0; font-size: 1.2rem; }
        .overlay p { font-size: 0.9rem; color: white; }

        @media (max-width: 768px) {
            .gallery-header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<nav>
    <div style="display: flex; align-items: center; gap: 15px;">
        <i class="fas fa-bars menu-btn" style="cursor: pointer;"></i>
        <a href="index.html">
            <img src="logo.jpg.png" alt="Mise Global Logo" height="50">
        </a>
    </div>
    <a href="contact.html" class="btn-gold" style="padding: 8px 20px; font-size: 0.8rem; border-radius: 5px;">Get a Quote</a>
</nav>

<header class="gallery-header">
    <h1>Our Portfolio</h1>
    <p>Visual stories of excellence in event management.</p>
</header>

<div class="filter-container">
    <button class="filter-btn active" onclick="filterGallery('all')">All Events</button>
    <button class="filter-btn" onclick="filterGallery('corporate')">Corporate</button>
    <button class="filter-btn" onclick="filterGallery('govt')">Government</button>
    <button class="filter-btn" onclick="filterGallery('medical')">Medical/Academic</button>
</div>

<div class="gallery-grid" id="gallery">
    
    <div class="gallery-item corporate">
        <img src="event1.jpg" alt="Corporate Event">
        <div class="overlay">
            <h3>Annual Summit</h3>
            <p>High-level corporate meeting management.</p>
            <a href="corporate-details.html" style="color: var(--gold); text-decoration: none; margin-top: 10px; font-weight: bold;">View More →</a>
        </div>
    </div>

    <div class="gallery-item govt">
        <img src="event2.jpg" alt="Government Event">
        <div class="overlay">
            <h3>State Campaign</h3>
            <p>Large scale logistics and VIP protocol.</p>
            <a href="govt-details.html" style="color: var(--gold); text-decoration: none; margin-top: 10px; font-weight: bold;">View More →</a>
        </div>
    </div>

    <div class="gallery-item medical">
        <img src="event3.jpg" alt="APICON Bihar">
        <div class="overlay">
            <h3>APICON 2026</h3>
            <p>Comprehensive conference management in Bihar.</p>
            <a href="medical-details.html" style="color: var(--gold); text-decoration: none; margin-top: 10px; font-weight: bold;">View More →</a>
        </div>
    </div>

    </div>

<script>
    function filterGallery(category) {
        const items = document.querySelectorAll('.gallery-item');
        const btns = document.querySelectorAll('.filter-btn');

        // Update active button
        btns.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        // Filter items
        items.forEach(item => {
            if (category === 'all' || item.classList.contains(category)) {
                item.style.display = 'block';
            } else {
                item.style.display = 'none';
            }
        });
    }
</script>

</body>
</html>
